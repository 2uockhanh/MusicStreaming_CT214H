<!DOCTYPE html>
<html lang="en" theme="dark">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>eMusik - Log In</title>
	<link rel="stylesheet" href='/css/welcome-style.css'>
</head>
<body>
	<div id="welcome" style="background-color: rgba(1,1,1,0.6);">
		<div style="text-align: right; margin-right: 10px; margin-top: 10px;">
			<button id="darkModeToggle" class="darkModeToggle">🌙 DARK</button>
		</div>
		<section>
			<div class="lg">
				<img class="logo" src="./img/logo.png">
			</div>
			<div class="login">
				<h3>LOG IN</h3>
				<div class="login_form">
					<table>
						<tr>
							<th>Username </th>
							<td><input type="text" id="input_username" name="input_username"></td>
						</tr>
						<tr>
							<th style="margin-right: 20px;">Password </th>
							<td><input type="text" id="input_password" name="input_password"></td>
						</tr>
					</table>
				</div>
				<div>
					<button class="btn">LOG IN</button>
				</div>
				<div class="nav_form">
					<table>
						<tr>
							<td>Not have an account? </td>
							<td>
								<a href="music-streaming-signup.html">Sign up now</a>
							</td>
						</tr>
					</table>
				</div>
			</div>
		</section>
	</div>
	<script src="music-streaming.js"></script>
</body>
</html>
