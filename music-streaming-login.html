<!DOCTYPE html>
<html lang="en" theme="dark">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>eMusik - Log In</title>
	<link rel="stylesheet" href='/css/welcome-style.css'>
</head>
<body>
	<div class="bg">
		<!-- <img style="opacity: 0.6" src="./img/dark-bg.jpg"> -->
		<div class="darkModeToggle">
			<button class="changModeButton">🌙 DARK</button>
		</div>
		<section>
			<div class="lg">
				<img class="logo" src="./img/logo.png">
			</div>
			<div class="login">
				<h3>LOG IN</h3>
				<form method="POST" action="music-streaming-login.php" class="login_form">
					<table>
						<tr>
							<th>Username </th>
							<td><input type="text" id="input_username" name="username" required></td>
						</tr>
						<tr>
							<th>Password </th>
							<td><input type="password" id="input_password" name="password" required></td>
						</tr>
					</table>
				</form>
				<div>
					<button class="btn" onclick="document.querySelector('.login_form').submit()">LOG IN</button>
				</div>
				<div class="nav_form">
					<table>
						<tr>
							<td>Not have an account? </td>
							<td>
								<a href="music-streaming-signup.html">Sign up now</a>
							</td>
						</tr>
					</table>
				</div>
			</div>
		</section>
	</div>
</body>
</html>
