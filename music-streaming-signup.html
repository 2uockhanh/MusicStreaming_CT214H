<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>eMusik - Sign Up</title>
	<link rel="stylesheet" href='/css/welcome-style.css'>
</head>
<body>
	<div class="bg">
		<div class="darkModeToggle">
			<button>🌙 DARK</button>
		</div>
		<section>
			<div class="lg">
				<img class="logo" src="./img/logo.png">
			</div>
			<div class="signup">
				<h3>SIGN UP</h3>
				<form method="POST" action="./auth/signup.php" class="signup_form">
					<table>
						<tr>
							<th>Username </th>
							<td><input type="text" id="input_username" name="username" required></td>
						</tr>
						<tr>
							<th>Password </th>
							<td><input type="password" id="input_password" name="password" required></td>
						</tr>
						<tr>
							<th>Email </th>
							<td><input type="email" id="input_email" name="email" required></td>
						</tr>
					</table>
				</form>
				<button class="btn" onclick="document.querySelector('.signup_form').submit()">SIGN UP</button>
				<div class="nav_form">
					<table>
						<tr>
							<td>Already have an account?</td>
							<td><a href="music-streaming-login.html">Log In Now.</a></td>
						</tr>
					</table>
				</div>
			</div>
		</section>
	</div>
</body>
</html>
