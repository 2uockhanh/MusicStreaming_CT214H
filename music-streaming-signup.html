<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>eMusik - Sign Up</title>
	<link rel="stylesheet" href='./css/welcome-style.css'>
</head>
<body>
	<div id="welcome" style="background-color: rgba(1,1,1,0.6);">
		<div style="text-align: right; margin-right: 10px; margin-top: 10px;">
			<button id="darkModeToggle" class="darkModeToggle">🌙 DARK</button>
		</div>
		<section>
			<div class="lg">
				<img class="logo" src="./img/logo.png">
			</div>
			<div class="signup">
				<h3>SIGN UP</h3>
				<div class="signup_form">
					<table>
						<tr>
							<th>Username </th>
							<td><input type="text" id="input_username" name="input_username"></td>
						</tr>
						<tr>
							<th>Password </th>
							<td><input type="text" id="input_password" name="input_password"></td>
						</tr>
						<tr>
							<th>Email </th>
							<td><input type="text" id="input_password" name="input_password"></td>
						</tr>
					</table>
				</div>
				<button class="btn">SIGN UP</button>
				<div class="nav_form">
					<table>
						<tr>
							<td>Already have an account?</td>
							<td><a href="music-streaming-login.html">Log In Now.</a></td>
						</tr>
					</table>
				</div>
			</div>
		</section>
	</div>
	<script src="./js/music-streaming-mode-toggle.js"></script>
	<script>
		document.getElementById("signUpBtn").addEventListener("click", checkSignUpInput);
		function checkSignUpInput() {
			const username = document.getElementById("input_username").value;
			const password = document.getElementById("input_password").value;
			const email = document.getElementById("input_email").value;
			if (username === "" || password === "" || email === "") {
				alert("Please type your information.");
				return;
			}
			// Mật khẩu không hợp lệ
			if (!validPassword(password)) {
				alert("Your password is invalid.");
				return;
			}
			// Email không hợp lệ
			if (!validEmail(email)) {
				alert("Your email is invalid.");
				return;
			}
			// Tất cả thông tin hợp lệ
			alert("Your information is valid.");
		}
		function validPassword(inputPassword) {
			// Độ dài mật khẩu có ít nhất 8 ký tự
			if (inputPassword.length < 8) {
				alert("Your password must have at least 8 characters.");
				return false;
			}
			// Các ký tự đặc biệt được phép dùng
			const specialCharList = '!@#$%^&*()-_+=[]{}:;><?|~,.';
			// Các biến đếm số ký tự thường, hoa, đặc biệt, chữ số
			let lowerChar = 0, upperChar = 0, specialChar = 0, digitChar = 0;
			for (let i = 0; i < inputPassword.length; i++) {
				// Mật khẩu không bao gồm ký tự cách
				if (inputPassword.charAt(i) == ' ') { return false; }
				if (inputPassword.charAt(i) >= 'A' && inputPassword.charAt(i) <= 'Z') { upperChar++; }
				if (inputPassword.charAt(i) >= 'a' && inputPassword.charAt(i) <= 'z') { lowerChar++; }
				if (inputPassword.charAt(i) >= '0' && inputPassword.charAt(i) <= '9') { digitChar++; }
				if (specialCharList.includes(inputPassword.charAt(i))) { specialChar++; }
			}
			// Mật khẩu cần phải có ít nhất 1 ký tự thường, 1 ký tự hoa, 1 ký tự đặc biệt, 1 ký tự chữ số
			if (lowerChar == 0 || upperChar == 0 || specialChar == 0 || digitChar == 0) {
				return false;
			}
			return true;
		};
		function validEmail(inputEmail) {
			// Các ký tự đặc biệt được phép dùng
			const specialCharList = '!@#$%^&*()-_+=[]{}:;><?|~,.';
			// Email không hợp lệ nếu không có ký tự @ và .
			if (inputEmail.indexOf('@') == -1 || inputEmail.indexOf('.') == -1) { return false; }
			// Email không hợp lệ nếu ký tự bắt đầu của email là chữ số
			if (inputEmail.charAt(0) >= '0' && inputEmail.charAt(0) <= '9') { return false; }
			// Email không hợp lệ nếu kết thúc bằng dấu .
			if (inputEmail.charAt(inputEmail.length - 1) === '.') { return false; }
			// Email không hợp lệ nếu ký tụ bắt đầu của email là ký tự đặc biệt
			if (specialCharList.includes(inputEmail.charAt(0))) { return false; }
			// Email không hợp lệ nếu số ký tự vượt quá 255.
			if (inputEmail.length > 255) {
				alert("Your email must not have more than 255 characters.")
				return false;
			}
			// Kiểm tra xem dấu @ cuối cùng có đứng trước dấu chấm cuối cùng hay không vì email có thể chứa nhiều dấu '.' VD: anhthi123.hgi@gmail.com
			if (inputEmail.lastIndexOf('@') > inputEmail.lastIndexOf('.')) { return false; }
			// Tạo biến đếm số ký tự @ trong email
			let countAt = 0;
			for (let i = 0; i < inputEmail.length; i++) {
				if (inputEmail.charAt(i) == '@') {
					countAt++;
					// Nếu gặp ký tự @ thứ 2, lập tức Email không hợp lệ
					if (countAt == 2) { return false; }
				}
			}
			return true;
		}
	</script>
</body>
</html>
