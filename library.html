<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eMuzik - Home</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/index_style.css">
    <link rel="stylesheet" href="css/theme-menu.css">
    <script src="js/cookie-handler.js"></script>
    <script src="js/theme-handler.js"></script>
  
</head>
<body>

    <aside class="sidebar">
        <div class="logo">eMuzik</div>
        <nav>
            <a href="index.html"><i class="fas fa-home"></i> HOME</a>
            <a href="library.html"><i class="fas fa-folder"></i> LIBRARY</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div style="flex: 1; display: flex; justify-content: center;">
                <div class="search-box">
                    <input type="text" placeholder="SEARCH">
                </div>
            </div>
            
            <div class="user-icon-wrapper">
                <div class="user-icon"><i class="fas fa-user"></i></div>
                <div class="dropdown-menu">
                    <a href="account.html">My Account</a>
                    <a href="#">Upload Song</a>
                    <div class="dropdown-menu">
                    <a href="account.html">My Account</a>
                    <a href="#">Upload Song</a>
                    <div class="submenu-item">
                    <a href="javascript:void(0)" class="submenu-toggle">
                        Theme Mode <i class="fas fa-chevron-right"></i>
                    </a>
                    <div class="theme-options">
                        <a href="#" onclick="ThemeHandler.toggle('dark')">
                            <i class="fas fa-moon"></i> DARK
                        </a>
                        <a href="#" onclick="ThemeHandler.toggle('light')">
                            <i class="fas fa-sun"></i> LIGHT
                        </a>
                    </div>
                </div>
                    <a href="#">Sign Out</a>
                </div>
            </div>
        </header>

        <div id="page-content">
            </div>

    </main>
</body>
</html>
