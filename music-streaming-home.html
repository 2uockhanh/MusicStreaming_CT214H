<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eMusik - Home</title> 
    <link rel="stylesheet" href='./css/home-style.css'>
    <link href='https://fonts.googleapis.com/css?family=Passero One' rel='stylesheet'>
</head>
<body>
    <div style="display: flex;">
        <div>
            <nav class="navbar">
                <button class="logo_nav" onclick="document.location='./music-streaming-home.html'">
                    <h3 style="font-family: 'Passero One'; font-size: 48px; margin: 0px auto;">eMuzik</h3>
                </button>
                <div class="nav">
                <table>
                        <tr>
                            <button class="nav_button" onclick="document.location='./music-streaming-home.html'">
                                <img class="nav_logo" src="./img/home.png"> Home</img>
                            </button>
                        </tr>
                        <tr>
                            <button class="nav_button" onclick="document.location='./music-streaming-library.html'">
                                <img class="nav_logo" src="./img/library.png"> Library
                            </button>
                        </tr>
                    </table>
                </div>
            </nav>
        </div>
        <div class="home">
            <div class="header"> 
                <ul style="display: grid; grid-template-columns: 90% 10%; list-style-type: none;">
                    <li>
                        <div class="search" style="text-align: center;">
                            <input type="text" id="search_info" name="search_info" placeholder="Search songs, artists..."></input>
                        </div>
                    </li>
                    <li>
                        <div class="avatar_dropdown" style="text-align: right; margin-right: 20px; margin-top: 20px; margin-bottom: 20px; width: 10%;">
                            <button class="dropbtn" id="dropbtn">
                                <img style="width: 40px; height: 40px; border-radius: 30px;" src="./img/avatar.jpg" alt="Avatar"></img>
                            </button>
                            <div class="dropDownList" name="avatar" id="dropDown">
                                <button onclick="document.location='./music-streaming-account.html'" value="myAccount" class="dropDownBtn">My Account</button>
                                <button value="themeMode" id="themeMode" class="dropDownBtn">🌙 Theme Mode</button>
                                <button onclick="document.location='./music-streaming-login.html'" value="logOut" class="dropDownBtn">Log Out</button>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
            <div class="show_song">
                <div class="show_song_head">
                    <h3>BEST SONG</h3>
                </div>
                <div class="show_song_body">
                    <div class="show_body_grid">
                        <button class="arrow-btn">
                            <img src="./img/left-arrow.png" style="height: 30px;"></img>
                        </button>
                    </div>
                    <div class="show_body_grid">
                        <!-- SONG 1 -->
                        <button class="song_nav">
                            <div class="song_nav_grid">
                                <img src="./img/song/song_jukysan/song_nguoidautien/poster.jpg" alt="eMusik"></img>
                                <div class="article_body">
                                    <h4>Người Đầu Tiên</h4> <h4 style="font-weight: lighter;">Juky San</h4>
                                </div>
                            </div>
                        </button>
                        <!-- SONG 2 -->
                        <button class="song_nav">
                            <div class="song_nav_grid">
                                <img src="./img/song/song_rio/song_emoidungkhoc/poster.jpg" alt="eMusik"></img>
                                <div class="article_body">
                                    <h4>em ơi đừng khóc</h4> <h4 style="font-weight: lighter;">RIO, buitruonglinh</h4>
                                </div>
                            </div>
                        </button>
                        <!-- SONG 3 -->
                        <button class="song_nav">
                            <div class="song_nav_grid">
                                <img src="./img/song/song_congb/song_vitaminc/poster.jpg" alt="eMusik"></img>
                                <div class="article_body">
                                    <h4>Vitamin C</h4> <h4 style="font-weight: lighter;">CONGB</h4>
                                </div>
                            </div>
                        </button>
                        <!-- SONG 4 -->
                        <button class="song_nav">
                            <div class="song_nav_grid">
                                <img src="./img/song/song_vuongbinh/song_thanhtan/poster.jpg" alt="eMusik"></img>
                                <div class="article_body">
                                    <h4>Thanh Tân</h4> <h4 style="font-weight: lighter;">Vương Bình</h4>
                                </div>
                            </div>
                        </button>
                        <!-- SONG 5 -->
                        <button class="song_nav">
                            <div class="song_nav_grid">
                                <img src="./img/song/song_buitruonglinh/song_duongtoichoemve/poster.jpg" alt="eMusik"></img>
                                <div class="article_body">
                                    <h4>Đường Tôi Chở Em Về</h4> <h4 style="font-weight: lighter;">buitruonglinh</h4>
                                </div>
                            </div>
                        </button>
                        <!-- SONG 6 -->
                        <button class="song_nav" onclick="document.location='music-streaming-song-info.html'">
                            <div class="song_nav_grid">
                                <img src="./img/song/song_buitruonglinh/song_tungngayyeuem/poster.jpg" alt="eMusik"></img>
                                <div class="article_body">
                                    <h4>Từng Ngày Yêu Em</h4> <h4 style="font-weight: lighter;">buitruonglinh</h4>
                                </div>
                            </div>
                        </button>
                    </div>
                    <div class="show_body_grid">
                        <button class="arrow-btn">
                            <img src="./img/right-arrow.png" style="height: 30px;"></img>
                        </button>
                    </div>
                </div>
            </div>
            <div class="show_artist">
                <div class="show_artist_head">
                    <h3>NOTABLE ARTIST</h3>
                </div>
                <div class="show_artist_body">
                    <div class="show_body_grid">
                        <button class="arrow-btn">
                            <img src="./img/left-arrow.png" style="height: 30px;"></img>
                        </button>
                    </div>
                    <div class="show_body_grid">
                        <!-- ARTIST 1 -->
                        <button class="artist_nav">
                            <img src="./img/artist/artist_jukysan.jpg" alt="eMusik"></img>
                            <div class="article_body">
                                <h4>Juky San</h4>
                            </div>
                        </button>
                        <!-- ARTIST 2 -->
                        <button class="artist_nav">
                            <img src="./img/artist/artist_rio.jpg" alt="eMusik"></img>
                            <div class="article_body">
                                <h4>RIO</h4>
                            </div>
                        </button>
                        <!-- ARTIST 3 -->
                        <button class="artist_nav">
                            <img src="./img/artist/artist_congb.jpg" alt="eMusik"></img>
                            <div class="article_body">
                                <h4>CONGB</h4>
                            </div>
                        </button>
                        <!-- ARTIST 4 -->
                        <button class="artist_nav">
                            <img src="./img/artist/artist_khoivu.jpg" alt="eMusik"></img>
                            <div class="article_body">
                                <h4>KHOI VU</h4>
                            </div>
                        </button>
                        <!-- ARTIST 5 -->
                        <button class="artist_nav" onclick="document.location='music-streaming-artist-info.html'">
                            <img src="./img/artist/artist_buitruonglinh.jpg" alt="eMusik"></img>
                            <div class="article_body">
                                <h4>buitruonglinh</h4>
                            </div>
                        </button>
                        <!-- ARTIST 6 -->
                        <button class="artist_nav">
                            <img src="./img/artist/artist_vuongbinh.jpg" alt="eMusik"></img>
                            <div class="article_body">
                                <h4>Vương Bình</h4>
                            </div>
                        </button>
                    </div>
                    <div class="show_body_grid">
                        <button class="arrow-btn">
                            <img src="./img/right-arrow.png" style="height: 30px;"></img>
                        </button>
                    </div>
                </div>
            </div>
            <div class="show_playlist">
                <div class="show_playlist_head">
                    <h3>BEST PLAYLIST</h3>
                </div>
                <div class="show_playlist_body">
                    <div class="show_body_grid">
                        <button class="arrow-btn">
                            <img src="./img/left-arrow.png" style="height: 30px;"></img>
                        </button>
                    </div>
                    <div class="show_body_grid">
                        <!-- SONG 1 -->
                        <button class="playlist_nav">
                            <div class="playlist_nav_grid">
                                <img src="./img/playlist/playlist_jukysan/album_damtinh/poster.jpg" alt="eMusik"></img>
                                <div class="article_body">
                                    <h4>Đẫm Tình</h4> <h4 style="font-weight: lighter;">Juky San</h4>
                                </div>
                            </div>
                        </button>
                        <!-- SONG 2 -->
                        <button class="playlist_nav">
                            <div class="playlist_nav_grid">
                                <img src="./img/playlist/playlist_buitruonglinh/diadon_duongtoichoemve/poster.jpg" alt="eMusik"></img>
                                <div class="article_body">
                                    <h4>Đường Tôi Chở Em Về</h4> <h4 style="font-weight: lighter;">buitruonglinh</h4>
                                </div>
                            </div>
                        </button>
                        <!-- SONG 3 -->
                        <button class="playlist_nav">
                            <div class="playlist_nav_grid">
                                <img src="./img/playlist/playlist_congb/album_congbday/poster.jpg" alt="eMusik"></img>
                                <div class="article_body">
                                    <h4>CONGBDAY</h4> <h4 style="font-weight: lighter;">CONGB</h4>
                                </div>
                            </div>
                        </button>
                    </div>
                    <div class="show_body_grid">
                        <button class="arrow-btn">
                            <img src="./img/right-arrow.png" style="height: 30px;"></img>
                        </button>
                    </div>
                </div>
            </div>
            <footer class="footer">
                <div class="footer-content">
                    <div class="footer-section">
                        <h4>About Us</h4>
                        <ul>
                            <li><a href="#Introduce">Introduce</a></li>
                            <li><a href="#Term">Term</a></li>
                            <li><a href="#Privacy">Privacy</a></li>
                            <li><a href="#PolicySafety">Policy And Safety</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>Useful Link</h4>
                        <ul>
                            <li><a href="./music-streaming-account.html">My Account</a></li>
                            <li><a href="./music-streaming-library.html">Library</a></li>
                            <li><a href="./music-streaming-favourite.html">Favourite</a></li>
                            <li><a href="./music-streaming-import-music.html">Import Music</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>Social Links</h4>
                        <ul>
                            <li><a href="#Facebook">Facebook</a></li>
                            <li><a href="#TikTok">TikTok</a></li>
                            <li><a href="#Threads">Threads</a></li>
                            <li><a href="#Instagram">Instagram</a></li>
                        </ul>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2026 eMusik. All rights reserved.</p>
                </div>
            </footer>
        </div>
    </div>
    <script src="./js/music-streaming-home.js"></script>
</body>
</html>
