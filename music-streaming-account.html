<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eMuzik - My Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/account-style.css">
    <link rel="stylesheet" href="./css/home-style.css">
    <link href='https://fonts.googleapis.com/css?family=Passero One' rel='stylesheet'>
</head>
<body>
    <div style="display: flex;">
        <div>
            <nav class="navbar">
                <button class="logo_nav" onclick="document.location='./music-streaming-home.html'">
                    <h3 style="font-family: 'Passero One'; font-size: 48px; margin: 0px auto;">eMuzik</h3>
                </button>
                <div class="nav">
                <table>
                    <tr>
                        <button class="nav_button" onclick="document.location='./music-streaming-home.html'">
                            <img class="nav_logo" src="./img/home.png"> Home</img>
                        </button>
                    </tr>
                    <tr>
                        <button class="nav_button" onclick="document.location='./music-streaming-library.html'">
                            <img class="nav_logo" src="./img/library.png"> Library
                        </button>
                    </tr>
                    <!--
                    <tr>
                        <button class="nav_button" onclick="document.location='./music-streaming-favourite.html'">
                            <img class="nav_logo" src="./img/favourite.png"> Favourite
                        </button>                        
                    </tr>
                    -->
                </table>
                </div>
            </nav>
        </div>
        <div class="home"> <!--class="main-content" -->
            <div class="header"> 
                <ul style="display: grid; grid-template-columns: 90% 10%; list-style-type: none;">
                    <li>
                        <div class="search" style="text-align: center;">
                            <input type="text" id="search_info" name="search_info" placeholder="Search songs, artists..."></input>
                        </div>
                    </li>
                    <li>
                        <div class="avatar_dropdown">
                            <button class="dropbtn" id="dropbtn">
                                <img style="width: 40px; height: 40px; border-radius: 30px;" src="./img/avatar.jpg" alt="Avatar"></img>
                            </button>
                            <div class="dropDownList" name="avatar" id="dropDown">
                                <button onclick="document.location='./music-streaming-account.html'" value="myAccount" class="dropDownBtn">My Account</option>
                                <!--<button value="MyFavourite" class="dropDownBtn">My Favourite</option>-->
                                <button value="themeMode" id="themeMode" class="dropDownBtn">🌙 Theme Mode</button>
                                <button onclick="document.location='./music-streaming-login.html'" value="logOut" class="dropDownBtn">Log Out</option>
                            </div>
                        </div>
                        <!--
                        <div class="avatar">
                            <div class="user-icon-wrapper">
                                <img style="width: 40px; height: 40px; border-radius: 30px;" src="./img/avatar.jpg" alt="Avatar"></img>
                                <div class="dropdown-menu"> <a href="account.html">My Account</a> <a href="#">My Favourite</a> <a href="#">Theme Mode</a> <a href="#">Log Out</a> </div>
                            </div>
                        </div>
                        -->
                    </li>
                </ul>
            </div>
            <section class="article_body">
                <h1>MY ACCOUNT</h1>
                <div class="profile-container">
                    <div class="avatar-section">
                        <div class="avatar-circle" id="avatar-preview"><i class="fas fa-user" style="font-size: 36px;"></i></div>
                        <input type="file" id="avatar-input" name="avatar" accept="image/*" style="display: none;">
                        <button class="btn-avatar" onclick="document.getElementById('avatar-input').click();">Change Avatar</button>
                    </div>
                    <div class="form-section">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" name="username">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="text" name="email">
                        </div>
                        <div class="form-group">
                            <label>Change<br>Password</label>
                            <input type="text" name="password">
                        </div>
                        <div class="form-group" style="justify-content: flex-end; margin-top: 10px;">
                            <button type="submit" class="btn-confirm">
                                <i class="fas fa-check-circle"></i> Confirm Change
                            </button>
                            <button type="button" class="btn-cancel">
                                <i class="fas fa-cancel"></i> Cancel 
                            </button>
                        </div>
                    </div>
                </div>
                <div class="action-buttons">
                    <button onclick="document.location='./music-streaming-library.html'" class="btn-action btn-library"><i class="fas fa-music"></i> MY LIBRARY</button>
                    <button onclick="document.location='./music-streaming-import-music.html'" class="btn-action btn-upload"><i class="fas fa-upload"></i> UPLOAD SONG</button>
                </div>
            </section>
            <footer class="footer">
                <div class="footer-content">
                    <div class="footer-section">
                        <h4>About Us</h4>
                        <ul>
                            <li><a href="#Introduce">Introduce</a></li>
                            <li><a href="#Term">Term</a></li>
                            <li><a href="#Privacy">Privacy</a></li>
                            <li><a href="#PolicySafety">Policy And Safety</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>Useful Link</h4>
                        <ul>
                            <li><a href="./music-streaming-account.html">My Account</a></li>
                            <li><a href="./music-streaming-library.html">Library</a></li>
                            <li><a href="./music-streaming-favourite.html">Favourite</a></li>
                            <li><a href="./music-streaming-import-music.html">Import Music</a></li>
                        </ul>
                    </div>
                    <div class="footer-section">
                        <h4>Social Links</h4>
                        <ul>
                            <li><a href="#Facebook">Facebook</a></li>
                            <li><a href="#TikTok">TikTok</a></li>
                            <li><a href="#Threads">Threads</a></li>
                            <li><a href="#Instagram">Instagram</a></li>
                        </ul>
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>&copy; 2026 eMusik. All rights reserved.</p>
                </div>
            </footer>
        </div>
    </div>
    <script src="./js/change-avatar.js"></script>
    <script src="./js/upload_handler.js"></script>
    <script src="./js/music-streaming-home.js"></script>
</body>
</html>
